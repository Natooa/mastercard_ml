paths:
  raw_data_dir: "data/raw"
  processed_data_dir: "data/processed"
  model_dir: "models"
  log_dir: "logs"
  business_file: "business_cards_MDQ.parquet"
  consumer_file: "consumer_cards_MDQ.parquet"
  output_features: "master_features.parquet"

pipeline:
  target_col: "target"
  group_col: "card_number"
  test_size: 0.2
  random_state: 42

model_params:
  objective: "binary"
  metric: "auc"
  learning_rate: 0.03
  num_leaves: 31
  max_depth: 5
  lambda_l1: 10.0
  lambda_l2: 10.0
  feature_fraction: 0.8
  verbose: -1
  n_estimators: 500